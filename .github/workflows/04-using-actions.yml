name: 04 - Using Actions 
  
on: push 

jobs:
  build:
    runs-on: ubuntu-latest 
    
    # 0 check out the code from the repository
    steps:
      - name: Checkout_code
        uses: actions/checkout@v4
      - name: Setup_Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install_deps_and_run_tests
        run: npm ci   
        working-directory: ./04-using-actions
      - name: Run_tests
        run: npm test
        working-directory: ./04-using-actions  

    # 1 installl deps for react 

    # 2 excute automated test 
